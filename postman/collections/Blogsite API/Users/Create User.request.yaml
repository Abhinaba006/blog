$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/api/users'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123"
    }
